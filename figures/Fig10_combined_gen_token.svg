<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="white"/>

  <!-- ==================== Panel (a): Generation Results ==================== -->
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="20" fill="#111">(a) Generation and Repair Results</text>
  <text x="40" y="62" font-family="Arial, sans-serif" font-size="13" fill="#555">llama3.1:8b on 113 deterministic tasks</text>

  <line x1="55" y1="380" x2="560" y2="380" stroke="#222" stroke-width="2"/>
  <line x1="55" y1="90" x2="55" y2="380" stroke="#222" stroke-width="2"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#666">
    <text x="28" y="384">0.0</text>
    <text x="28" y="308">0.25</text>
    <text x="28" y="232">0.50</text>
    <text x="28" y="156">0.75</text>
    <text x="28" y="84">1.0</text>
  </g>

  <g stroke="#ddd" stroke-width="1">
    <line x1="55" y1="308" x2="560" y2="308"/>
    <line x1="55" y1="235" x2="560" y2="235"/>
    <line x1="55" y1="163" x2="560" y2="163"/>
    <line x1="55" y1="90" x2="560" y2="90"/>
  </g>

  <!-- 6 bars: width=50, centers spaced by 72: 55+36=91, 163, 235, 307, 379, 451 -->
  <rect x="66" y="90" width="50" height="290" fill="#4C78A8"/>
  <rect x="138" y="90" width="50" height="290" fill="#4C78A8"/>
  <rect x="210" y="90" width="50" height="290" fill="#4C78A8"/>
  <rect x="282" y="90" width="50" height="290" fill="#4C78A8"/>
  <rect x="354" y="95" width="50" height="285" fill="#72B7B2"/>
  <rect x="426" y="375" width="50" height="5" fill="#72B7B2"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#111" text-anchor="middle">
    <text x="91" y="405">IR valid</text>
    <text x="163" y="405">Compile</text>
    <text x="235" y="405">Verify</text>
    <text x="307" y="405">Execute</text>
    <text x="379" y="405">Success@1</text>
    <text x="451" y="405">Success@2</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111" text-anchor="middle">
    <text x="91" y="82">1.000</text>
    <text x="163" y="82">1.000</text>
    <text x="235" y="82">1.000</text>
    <text x="307" y="82">1.000</text>
    <text x="379" y="87">0.982</text>
    <text x="451" y="368">0.018</text>
  </g>

  <!-- ==================== Panel (b): Token Cost ==================== -->
  <text x="620" y="40" font-family="Arial, sans-serif" font-size="20" fill="#111">(b) Token Cost on Triple-equivalent Subset</text>
  <text x="620" y="62" font-family="Arial, sans-serif" font-size="13" fill="#555">52 tasks where MIR / JSON / PYTHON are semantically equivalent</text>

  <line x1="635" y1="380" x2="1140" y2="380" stroke="#222" stroke-width="2"/>
  <line x1="635" y1="90" x2="635" y2="380" stroke="#222" stroke-width="2"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#666">
    <text x="606" y="384">0</text>
    <text x="598" y="308">100</text>
    <text x="598" y="232">200</text>
    <text x="598" y="156">300</text>
    <text x="598" y="84">400</text>
  </g>

  <g stroke="#ddd" stroke-width="1">
    <line x1="635" y1="308" x2="1140" y2="308"/>
    <line x1="635" y1="235" x2="1140" y2="235"/>
    <line x1="635" y1="163" x2="1140" y2="163"/>
    <line x1="635" y1="90" x2="1140" y2="90"/>
  </g>

  <!-- MIR group -->
  <rect x="685" y="267" width="40" height="113" fill="#4C78A8"/>
  <rect x="735" y="349" width="40" height="31" fill="#F58518"/>
  <rect x="785" y="298" width="40" height="82" fill="#54A24B"/>
  <!-- JSON group -->
  <rect x="910" y="285" width="40" height="95" fill="#4C78A8"/>
  <rect x="960" y="322" width="40" height="58" fill="#F58518"/>
  <rect x="1010" y="175" width="40" height="205" fill="#54A24B"/>
  <!-- PYTHON group -->
  <rect x="1070" y="282" width="40" height="98" fill="#4C78A8"/>
  <rect x="1120" y="365" width="40" height="15" fill="#F58518"/>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111" text-anchor="middle">
    <!-- Group labels -->
    <text x="755" y="405">MIR</text>
    <text x="960" y="405">JSON</text>
    <text x="1090" y="405">PYTHON</text>

    <!-- MIR values -->
    <text x="705" y="260">161.15</text>
    <text x="755" y="342">40.00</text>
    <text x="805" y="291">115.38</text>

    <!-- JSON values -->
    <text x="930" y="278">83.15</text>
    <text x="980" y="315">77.54</text>
    <text x="1030" y="168">295.67</text>

    <!-- PYTHON values -->
    <text x="1090" y="275">85.15</text>
    <text x="1140" y="358">17.19</text>
    <text x="1060" y="445" font-size="11">60.54</text>
  </g>

  <!-- Legend -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#555">
    <rect x="680" y="430" width="10" height="10" fill="#4C78A8"/>
    <text x="696" y="440">Input tokens</text>
    <rect x="800" y="430" width="10" height="10" fill="#F58518"/>
    <text x="816" y="440">Output tokens</text>
    <rect x="920" y="430" width="10" height="10" fill="#54A24B"/>
    <text x="936" y="440">Output bytes</text>
  </g>
</svg>
