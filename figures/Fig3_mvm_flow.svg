<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 720" font-family="Helvetica, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" font-size="16" font-weight="bold">MVM Execution and Guardrail Flow</text>

  <!-- Step 1: Load frame -->
  <rect x="110" y="55" width="300" height="55" rx="10" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="260" y="88" text-anchor="middle" font-size="14">Load frame</text>
  <line x1="260" y1="110" x2="260" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Decode opcode -->
  <rect x="110" y="130" width="300" height="55" rx="10" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="260" y="163" text-anchor="middle" font-size="14">Decode opcode</text>
  <line x1="260" y1="185" x2="260" y2="205" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Static checks -->
  <rect x="110" y="205" width="300" height="55" rx="10" fill="#d4edda" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="260" y="228" text-anchor="middle" font-size="14">Static checks</text>
  <text x="260" y="247" text-anchor="middle" font-size="12" fill="#555">(bounds / encoding)</text>
  <line x1="260" y1="260" x2="260" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Runtime guards -->
  <rect x="110" y="280" width="300" height="55" rx="10" fill="#d4edda" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="260" y="303" text-anchor="middle" font-size="14">Runtime guards</text>
  <text x="260" y="322" text-anchor="middle" font-size="12" fill="#555">(stack / depth / step / caps)</text>

  <!-- Branch: fail -> Fault -->
  <line x1="110" y1="307" x2="75" y2="307" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="85" y="298" font-size="11" fill="#c0392b">fail</text>
  <rect x="10" y="278" width="65" height="58" rx="8" fill="#f8d7da" stroke="#c0392b" stroke-width="1.5"/>
  <text x="42" y="302" text-anchor="middle" font-size="12">Fault</text>
  <text x="42" y="318" text-anchor="middle" font-size="11" fill="#555">(code, pc)</text>

  <!-- Continue: Runtime guards -> Execute -->
  <line x1="260" y1="335" x2="260" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Execute -->
  <rect x="110" y="355" width="300" height="55" rx="10" fill="#fef3cd" stroke="#d4a843" stroke-width="1.5"/>
  <text x="260" y="388" text-anchor="middle" font-size="14">Execute IOW / IOR / ALU</text>
  <line x1="260" y1="410" x2="260" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Emit result or fault -->
  <rect x="110" y="430" width="300" height="55" rx="10" fill="#f5d5e0" stroke="#c47a8a" stroke-width="1.5"/>
  <text x="260" y="463" text-anchor="middle" font-size="14">Emit result or fault</text>

  <!-- Legend -->
  <rect x="110" y="520" width="14" height="14" rx="3" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1"/>
  <text x="130" y="532" font-size="11" fill="#555">Fetch / Decode</text>
  <rect x="240" y="520" width="14" height="14" rx="3" fill="#d4edda" stroke="#5cb85c" stroke-width="1"/>
  <text x="260" y="532" font-size="11" fill="#555">Guardrails</text>
  <rect x="110" y="544" width="14" height="14" rx="3" fill="#fef3cd" stroke="#d4a843" stroke-width="1"/>
  <text x="130" y="556" font-size="11" fill="#555">Execution</text>
  <rect x="240" y="544" width="14" height="14" rx="3" fill="#f5d5e0" stroke="#c47a8a" stroke-width="1"/>
  <text x="260" y="556" font-size="11" fill="#555">Output</text>
  <rect x="110" y="568" width="14" height="14" rx="3" fill="#f8d7da" stroke="#c0392b" stroke-width="1"/>
  <text x="130" y="580" font-size="11" fill="#555">Fault (rejected)</text>
</svg>
