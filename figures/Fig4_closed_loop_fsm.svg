<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Helvetica, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="bold">Closed-loop State Machine</text>

  <!-- SET -->
  <rect x="30" y="140" width="120" height="60" rx="10" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="90" y="175" text-anchor="middle" font-size="14" font-weight="bold">SET</text>

  <!-- Arrow SET -> ACK -->
  <line x1="150" y1="170" x2="195" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ACK -->
  <rect x="195" y="140" width="120" height="60" rx="10" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="255" y="175" text-anchor="middle" font-size="14" font-weight="bold">ACK</text>

  <!-- Arrow ACK -> READBACK -->
  <line x1="315" y1="170" x2="360" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- READBACK -->
  <rect x="360" y="140" width="120" height="60" rx="10" fill="#d4edda" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="420" y="175" text-anchor="middle" font-size="14" font-weight="bold">READBACK</text>

  <!-- Arrow READBACK -> COMPARE -->
  <line x1="480" y1="170" x2="525" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- COMPARE -->
  <rect x="525" y="140" width="130" height="60" rx="10" fill="#fef3cd" stroke="#d4a843" stroke-width="1.5"/>
  <text x="590" y="175" text-anchor="middle" font-size="14" font-weight="bold">COMPARE</text>

  <!-- COMPARE -> CONVERGED (match) -->
  <line x1="590" y1="140" x2="590" y2="80" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="605" y="112" font-size="12" fill="#27ae60">match</text>
  <rect x="525" y="35" width="130" height="50" rx="10" fill="#d4edda" stroke="#27ae60" stroke-width="1.5"/>
  <text x="590" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">CONVERGED</text>

  <!-- COMPARE -> SAFE/FAULT (fault) -->
  <line x1="590" y1="200" x2="590" y2="270" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="605" y="240" font-size="12" fill="#c0392b">fault</text>
  <rect x="525" y="270" width="130" height="50" rx="10" fill="#f8d7da" stroke="#c0392b" stroke-width="1.5"/>
  <text x="590" y="301" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">SAFE / FAULT</text>

  <!-- COMPARE -> retry -> SET (mismatch) -->
  <line x1="525" y1="195" x2="525" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="525" y1="340" x2="90" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="90" y1="340" x2="90" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="332" text-anchor="middle" font-size="12" fill="#333">mismatch → retry</text>

  <!-- Legend -->
  <rect x="30" y="390" width="12" height="12" rx="3" fill="#dce8f5" stroke="#4a7ab5" stroke-width="1"/>
  <text x="48" y="401" font-size="11" fill="#555">I/O stage</text>
  <rect x="140" y="390" width="12" height="12" rx="3" fill="#d4edda" stroke="#5cb85c" stroke-width="1"/>
  <text x="158" y="401" font-size="11" fill="#555">Verify stage</text>
  <rect x="260" y="390" width="12" height="12" rx="3" fill="#fef3cd" stroke="#d4a843" stroke-width="1"/>
  <text x="278" y="401" font-size="11" fill="#555">Decision</text>
  <rect x="370" y="390" width="12" height="12" rx="3" fill="#d4edda" stroke="#27ae60" stroke-width="1"/>
  <text x="388" y="401" font-size="11" fill="#555">Success</text>
  <rect x="470" y="390" width="12" height="12" rx="3" fill="#f8d7da" stroke="#c0392b" stroke-width="1"/>
  <text x="488" y="401" font-size="11" fill="#555">Failure</text>
</svg>
