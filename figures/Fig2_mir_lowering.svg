<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111; }
      .label { font: 600 18px Arial, sans-serif; fill: #111; }
      .body { font: 15px Consolas, monospace; fill: #222; }
      .small { font: 14px Arial, sans-serif; fill: #444; }
      .box { fill: #f7f8fb; stroke: #2c3e50; stroke-width: 2; rx: 12; ry: 12; }
      .accent { fill: #eef6ff; stroke: #1f78d1; stroke-width: 2; rx: 12; ry: 12; }
      .byte { fill: #f5fff1; stroke: #2f8f2f; stroke-width: 2; rx: 12; ry: 12; }
      .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <text x="40" y="45" class="title">Fig.2  Lowering Example: "Open pump and read water sensor"</text>

  <rect x="40" y="80" width="300" height="330" class="accent"/>
  <text x="60" y="115" class="label">Textual M-IR</text>
  <text x="60" y="155" class="body">task pump_and_read {</text>
  <text x="60" y="185" class="body">  require cap(5), cap(1)</text>
  <text x="60" y="215" class="body">  set relay1 = 1</text>
  <text x="60" y="245" class="body">  wait 500ms</text>
  <text x="60" y="275" class="body">  read water_sensor</text>
  <text x="60" y="305" class="body">  halt</text>
  <text x="60" y="335" class="body">}</text>
  <text x="60" y="385" class="small">Running example: LLM outputs a structured M-IR program.</text>

  <rect x="440" y="80" width="300" height="330" class="box"/>
  <text x="460" y="115" class="label">Lowering / Compiler Rules</text>
  <text x="460" y="155" class="body">require cap(5)   -&gt; GTWAY 5</text>
  <text x="460" y="185" class="body">require cap(1)   -&gt; GTWAY 1</text>
  <text x="460" y="215" class="body">set relay1 = 1   -&gt; LIT 1 ; IOW 5</text>
  <text x="460" y="245" class="body">wait 500ms       -&gt; WAIT 500</text>
  <text x="460" y="275" class="body">read water_sensor-&gt; IOR 1</text>
  <text x="460" y="305" class="body">halt             -&gt; HALT</text>
  <text x="460" y="355" class="small">Deterministic compilation preserves control intent</text>
  <text x="460" y="377" class="small">while moving from human/LLM-friendly syntax to compact tokens.</text>

  <rect x="840" y="80" width="320" height="330" class="byte"/>
  <text x="860" y="115" class="label">Compiled M-bytecode</text>
  <text x="860" y="155" class="body">GTWAY 5</text>
  <text x="860" y="185" class="body">GTWAY 1</text>
  <text x="860" y="215" class="body">LIT 1</text>
  <text x="860" y="245" class="body">IOW 5</text>
  <text x="860" y="275" class="body">WAIT 500</text>
  <text x="860" y="305" class="body">IOR 1</text>
  <text x="860" y="335" class="body">HALT</text>
  <text x="860" y="385" class="small">Varint / zigzag encoding is applied after instruction selection.</text>

  <path d="M340 245 L430 245" class="arrow"/>
  <path d="M740 245 L830 245" class="arrow"/>

  <text x="355" y="225" class="small">compile</text>
  <text x="760" y="225" class="small">encode</text>
</svg>
